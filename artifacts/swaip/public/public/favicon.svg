<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d2452"/>
      <stop offset="1" stop-color="#020514"/>
    </linearGradient>
    <linearGradient id="ink" x1="20" y1="50" x2="160" y2="130" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f2fcff"/>
      <stop offset="0.45" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#0a84d8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>
  <!-- subtle inner glow ring -->
  <rect width="180" height="180" rx="40" fill="none" stroke="rgba(56,189,248,0.18)" stroke-width="2"/>
  <text x="90" y="100" text-anchor="middle" dominant-baseline="central"
        font-family="Montserrat, 'Arial Black', sans-serif" font-weight="900"
        font-size="56" fill="url(#ink)" letter-spacing="-1" filter="url(#glow)">SWAP</text>
</svg>
